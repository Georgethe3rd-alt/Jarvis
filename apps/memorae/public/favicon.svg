<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#4fc3f7" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0288d1" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#01579b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="bigblur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#0a0a1a"/>
  <!-- Outer glow -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3" filter="url(#bigblur)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.8"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#81d4fa" stroke-width="0.5" opacity="0.4"/>
  <!-- Middle ring -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.8"/>
  <!-- Spokes -->
  <line x1="32" y1="6" x2="32" y2="13" stroke="#4fc3f7" stroke-width="2" opacity="0.9"/>
  <line x1="32" y1="51" x2="32" y2="58" stroke="#4fc3f7" stroke-width="2" opacity="0.9"/>
  <line x1="6" y1="32" x2="13" y2="32" stroke="#4fc3f7" stroke-width="2" opacity="0.9"/>
  <line x1="51" y1="32" x2="58" y2="32" stroke="#4fc3f7" stroke-width="2" opacity="0.9"/>
  <!-- Diagonal spokes -->
  <line x1="13.6" y1="13.6" x2="18.5" y2="18.5" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7"/>
  <line x1="45.5" y1="45.5" x2="50.4" y2="50.4" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7"/>
  <line x1="50.4" y1="13.6" x2="45.5" y2="18.5" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7"/>
  <line x1="18.5" y1="45.5" x2="13.6" y2="50.4" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7"/>
  <!-- Core glow -->
  <circle cx="32" cy="32" r="8" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Core center -->
  <circle cx="32" cy="32" r="5" fill="#e1f5fe" opacity="0.95"/>
  <circle cx="32" cy="32" r="3" fill="#ffffff"/>
  <!-- Triangle detail in core -->
  <polygon points="32,27 36,34 28,34" fill="none" stroke="#0288d1" stroke-width="0.8" opacity="0.6"/>
</svg>
