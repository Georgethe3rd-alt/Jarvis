<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Jarvis — Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020a18;--surface:rgba(0,20,40,0.6);--border:rgba(0,170,255,0.12);--accent:#0af;--accent2:#78d6ff;--text:#c8dce8;--dim:#4a6a80;--green:#00ff88;--red:#ff4444;--yellow:#ffaa00}
body{background:var(--bg);color:var(--text);font-family:'SF Mono',Monaco,'Cascadia Code',monospace;min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;max-width:400px;width:90%}
.login-box h1{color:var(--accent);font-size:1.5em;margin-bottom:8px}
.login-box p{color:var(--dim);font-size:.85em;margin-bottom:24px}
input,button{width:100%;padding:12px;border-radius:8px;font-family:inherit;font-size:.9em;margin-bottom:12px}
input{background:var(--bg);border:1px solid var(--border);color:var(--text);outline:none}
input:focus{border-color:var(--accent)}
button{background:var(--accent);color:#000;border:none;cursor:pointer;font-weight:bold;transition:.2s}
button:hover{opacity:.85}
button.secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.hidden{display:none!important}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px}
.sidebar h2{color:var(--accent);font-size:1.1em;margin-bottom:24px}
.sidebar a{display:block;padding:10px 14px;color:var(--dim);text-decoration:none;border-radius:8px;margin-bottom:4px;font-size:.85em;transition:.2s}
.sidebar a:hover,.sidebar a.active{color:var(--text);background:rgba(0,212,255,.08)}
.sidebar a.active{color:var(--accent)}
.main{padding:32px;overflow-y:auto;max-height:100vh}
.main h1{font-size:1.4em;margin-bottom:24px;color:var(--accent)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{color:var(--accent);font-size:.95em;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat .val{font-size:1.8em;font-weight:bold;color:var(--accent)}
.stat .label{font-size:.75em;color:var(--dim);margin-top:4px}
.memory-item,.reminder-item,.msg{padding:12px;border-bottom:1px solid var(--border);font-size:.85em;display:flex;justify-content:space-between;align-items:start;gap:12px}
.memory-item:last-child,.reminder-item:last-child,.msg:last-child{border-bottom:none}
.tag{background:rgba(0,212,255,.15);color:var(--accent);padding:2px 8px;border-radius:4px;font-size:.75em}
.del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:.8em;width:auto;padding:4px 8px;margin:0}
.msg.user{opacity:.7}
.msg .role{color:var(--accent);min-width:60px;font-weight:bold;font-size:.75em}
.usage-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0}
.usage-bar .fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:4px;transition:.3s}
.plan-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.plan-card{border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.plan-card.current{border-color:var(--accent);background:rgba(0,212,255,.05)}
.plan-card .price{font-size:1.5em;color:var(--accent);font-weight:bold}
.plan-card .tier{font-size:.85em;color:var(--dim);margin:4px 0 12px}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:1001;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;cursor:pointer;color:var(--accent);font-size:18px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999}
@media(max-width:768px){
  .hamburger{display:block}
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;height:100vh;z-index:1000;transform:translateX(-100%);transition:transform 0.3s;width:240px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{padding:16px;padding-top:50px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .plan-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:16px"><img src="/jarvis-helm.svg" alt="Jarvis" style="width:64px;height:auto;filter:drop-shadow(0 0 12px rgba(120,200,255,0.4))"></div>
    <h1 style="text-align:center">J.A.R.V.I.S.</h1>
    <p>Sign in with your WhatsApp number</p>
    <div id="phoneStep">
      <input id="phoneInput" placeholder="+1868..." type="tel">
      <button onclick="requestCode()">Send Login Code</button>
    </div>
    <div id="codeStep" class="hidden">
      <p style="color:var(--green);margin-bottom:12px">Code sent! Check WhatsApp.</p>
      <input id="codeInput" placeholder="6-digit code" maxlength="6">
      <button onclick="verifyCode()">Verify</button>
    </div>
    <p id="loginError" style="color:var(--red);font-size:.8em"></p>
  </div>
</div>

<!-- App -->
<div id="app" class="app hidden">
  <div class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay').classList.toggle('open')">☰</div>
  <div class="sidebar-overlay" onclick="document.querySelector('.sidebar').classList.toggle('open');this.classList.toggle('open')"></div>
  <div class="sidebar">
    <h2 style="display:flex;align-items:center;gap:10px"><img src="/jarvis-helm.svg" alt="" style="width:28px;height:auto;filter:drop-shadow(0 0 8px rgba(120,200,255,0.3))"> JARVIS</h2>
    <a href="#" onclick="showTab('overview')" class="active" data-tab="overview">📊 Overview</a>
    <a href="#" onclick="showTab('memories')" data-tab="memories">🧠 Memories</a>
    <a href="#" onclick="showTab('reminders')" data-tab="reminders">⏰ Reminders</a>
    <a href="#" onclick="showTab('conversations')" data-tab="conversations">💬 Conversations</a>
    <a href="#" onclick="showTab('plan')" data-tab="plan">💳 Plan & Billing</a>
    <a href="#" onclick="showTab('settings')" data-tab="settings">⚙️ Settings</a>
    <a href="#" onclick="logout()" style="margin-top:auto;color:var(--red)">🚪 Logout</a>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<script>
const API = '/dashboard/api';
let token = localStorage.getItem('jarvis_token');
let phone = '';
let profile = {};

if (token) { initApp(); } 

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token, ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

async function requestCode() {
  phone = document.getElementById('phoneInput').value.replace(/[^\d+]/g, '');
  const res = await fetch(API + '/login/request', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone })
  });
  const data = await res.json();
  if (data.success) {
    document.getElementById('phoneStep').classList.add('hidden');
    document.getElementById('codeStep').classList.remove('hidden');
  } else {
    document.getElementById('loginError').textContent = data.error || 'Failed to send code';
  }
}

async function verifyCode() {
  const code = document.getElementById('codeInput').value;
  const res = await fetch(API + '/login/verify', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone, code })
  });
  const data = await res.json();
  if (data.token) {
    token = data.token;
    localStorage.setItem('jarvis_token', token);
    initApp();
  } else {
    document.getElementById('loginError').textContent = data.error || 'Invalid code';
  }
}

async function initApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  profile = await api('/profile') || {};
  showTab('overview');
}

function logout() {
  localStorage.removeItem('jarvis_token');
  token = null;
  location.reload();
}

function showTab(tab) {
  if(window.innerWidth<=768){document.querySelector('.sidebar').classList.remove('open');document.querySelector('.sidebar-overlay').classList.remove('open')}
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.toggle('active', a.dataset.tab === tab));
  const mc = document.getElementById('mainContent');
  switch(tab) {
    case 'overview': renderOverview(mc); break;
    case 'memories': renderMemories(mc); break;
    case 'reminders': renderReminders(mc); break;
    case 'conversations': renderConversations(mc); break;
    case 'plan': renderPlan(mc); break;
    case 'settings': renderSettings(mc); break;
  }
}

function renderOverview(el) {
  const pct = profile.messagesLimit ? Math.min(100, (profile.messagesUsed / profile.messagesLimit) * 100) : 0;
  el.innerHTML = `<h1>Welcome back, ${profile.name || 'Human'}</h1>
    <div class="stat-grid">
      <div class="stat"><div class="val">${profile.messagesUsed || 0}</div><div class="label">Messages This Month</div></div>
      <div class="stat"><div class="val">${profile.messagesLimit || '∞'}</div><div class="label">Message Limit</div></div>
      <div class="stat"><div class="val">${profile.plan?.toUpperCase() || 'FREE'}</div><div class="label">Current Plan</div></div>
      <div class="stat"><div class="val">${profile.briefingTime || '—'}</div><div class="label">Daily Briefing</div></div>
    </div>
    ${profile.messagesLimit ? `<div class="card"><h3>Usage</h3><div class="usage-bar"><div class="fill" style="width:${pct}%"></div></div><p style="font-size:.8em;color:var(--dim)">${profile.messagesUsed} / ${profile.messagesLimit} messages</p></div>` : ''}`;
}

async function renderMemories(el) {
  el.innerHTML = '<h1>🧠 Memories</h1><p style="color:var(--dim)">Loading...</p>';
  const memories = await api('/memories') || [];
  el.innerHTML = '<h1>🧠 Memories</h1>' + (memories.length ? '<div class="card">' + memories.map(m =>
    `<div class="memory-item"><div><span class="tag">${m.category}</span> ${m.content}<br><small style="color:var(--dim)">${new Date(m.created_at).toLocaleDateString()}</small></div><button class="del-btn" onclick="delMemory(${m.id})">✕</button></div>`
  ).join('') + '</div>' : '<p style="color:var(--dim)">No memories yet. Start chatting!</p>');
}

async function delMemory(id) { await api('/memories/' + id, { method: 'DELETE' }); showTab('memories'); }

async function renderReminders(el) {
  el.innerHTML = '<h1>⏰ Reminders</h1><p style="color:var(--dim)">Loading...</p>';
  const reminders = await api('/reminders') || [];
  el.innerHTML = '<h1>⏰ Reminders</h1>' + (reminders.length ? '<div class="card">' + reminders.map(r =>
    `<div class="reminder-item"><div>${r.content}<br><small style="color:var(--dim)">Due: ${new Date(r.remind_at).toLocaleString()}</small> ${r.sent?'<span class="tag">Sent</span>':''}</div><button class="del-btn" onclick="delReminder(${r.id})">✕</button></div>`
  ).join('') + '</div>' : '<p style="color:var(--dim)">No reminders set.</p>');
}

async function delReminder(id) { await api('/reminders/' + id, { method: 'DELETE' }); showTab('reminders'); }

async function renderConversations(el) {
  el.innerHTML = '<h1>💬 Conversations</h1><p style="color:var(--dim)">Loading...</p>';
  const convos = await api('/conversations') || [];
  const recent = convos.reverse().slice(-100);
  el.innerHTML = '<h1>💬 Recent Conversations</h1><div class="card">' + (recent.length ? recent.map(m =>
    `<div class="msg ${m.role}"><span class="role">${m.role === 'user' ? 'YOU' : 'JARVIS'}</span><div>${m.content.substring(0, 500)}</div></div>`
  ).join('') : '<p style="color:var(--dim)">No conversations yet.</p>') + '</div>';
}

function renderPlan(el) {
  const base = location.origin;
  const ph = profile.phone || '';
  el.innerHTML = `<h1>💳 Plan & Billing</h1>
    <p style="margin-bottom:16px">Current: <strong style="color:var(--accent)">${(profile.plan||'free').toUpperCase()}</strong> — ${profile.planLabel || 'Free'}</p>
    <div class="plan-cards">
      <div class="plan-card ${profile.plan==='free'?'current':''}"><div class="price">$0</div><div class="tier">Free</div><p>50 messages/month</p></div>
      <div class="plan-card ${profile.plan==='pro'?'current':''}"><div class="price">$9.99</div><div class="tier">Pro</div><p>500 messages/month</p>${profile.plan!=='pro'?`<button onclick="location.href='/billing/checkout/pro?phone=${ph}'" style="margin-top:12px">Upgrade</button>`:''}</div>
      <div class="plan-card ${profile.plan==='unlimited'?'current':''}"><div class="price">$24.99</div><div class="tier">Unlimited</div><p>Unlimited messages</p>${profile.plan!=='unlimited'?`<button onclick="location.href='/billing/checkout/unlimited?phone=${ph}'" style="margin-top:12px">Upgrade</button>`:''}</div>
    </div>`;
}

function renderSettings(el) {
  el.innerHTML = `<h1>⚙️ Settings</h1>
    <div class="card"><h3>Display Name</h3>
      <input id="nameInput" value="${profile.name||''}" style="width:auto;display:inline-block;margin-right:8px">
      <button onclick="updateName()" style="width:auto;display:inline-block;padding:12px 20px">Save</button>
    </div>
    <div class="card"><h3>Daily Briefing Time</h3>
      <p style="font-size:.85em;color:var(--dim);margin-bottom:12px">Current: ${profile.briefingTime || 'Not set'}</p>
      <input id="briefingInput" placeholder="e.g. 8am, 09:00, 7:30pm" style="width:auto;display:inline-block;margin-right:8px">
      <button onclick="updateBriefing()" style="width:auto;display:inline-block;padding:12px 20px">Set</button>
    </div>
    <div class="card"><h3>Export Your Data</h3>
      <p style="font-size:.85em;color:var(--dim);margin-bottom:12px">Download all your data stored by Jarvis.</p>
      <button onclick="exportData('json')" style="width:auto;display:inline-block;padding:12px 20px;margin-right:8px">📦 Export JSON</button>
      <button onclick="exportData('csv')" class="secondary" style="width:auto;display:inline-block;padding:12px 20px">📊 Export CSV</button>
    </div>`;
}
function exportData(format) {
  const a = document.createElement('a');
  a.href = API + '/export/' + format;
  a.setAttribute('download', '');
  // Add auth via a temporary form or use fetch
  fetch(API + '/export/' + format, { headers: { Authorization: 'Bearer ' + token } })
    .then(r => r.blob())
    .then(blob => { const url = URL.createObjectURL(blob); a.href = url; a.download = 'jarvis-export.' + format; a.click(); URL.revokeObjectURL(url); });
}

async function updateName() {
  await api('/settings/name', { method: 'PUT', body: { name: document.getElementById('nameInput').value } });
  profile = await api('/profile');
  showTab('settings');
}

async function updateBriefing() {
  await api('/settings/briefing', { method: 'PUT', body: { time: document.getElementById('briefingInput').value } });
  profile = await api('/profile');
  showTab('settings');
}
</script>
</body>
</html>
