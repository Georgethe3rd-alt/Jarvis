<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">
  <defs>
    <linearGradient id="helm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="50%" stop-color="#8b1a1a"/>
      <stop offset="100%" stop-color="#5a0f0f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4d03f"/>
      <stop offset="100%" stop-color="#c9a20e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Helmet shell -->
  <path d="M60 8 C25 8 12 40 12 70 C12 95 20 110 35 120 L40 125 L80 125 L85 120 C100 110 108 95 108 70 C108 40 95 8 60 8Z" fill="url(#helm)" stroke="#3a0808" stroke-width="1"/>
  <!-- Face plate gold -->
  <path d="M60 35 C40 35 30 50 28 65 L28 85 C28 95 38 108 42 112 L60 118 L78 112 C82 108 92 95 92 85 L92 65 C90 50 80 35 60 35Z" fill="url(#gold)" stroke="#8a6b0a" stroke-width="0.5"/>
  <!-- Forehead red section -->
  <path d="M60 8 C38 8 25 28 20 48 L40 35 L60 30 L80 35 L100 48 C95 28 82 8 60 8Z" fill="url(#helm)" stroke="#3a0808" stroke-width="0.5"/>
  <!-- Center forehead line -->
  <line x1="60" y1="12" x2="60" y2="32" stroke="#3a0808" stroke-width="1.5"/>
  <!-- Eyes -->
  <path d="M32 62 L46 56 L52 62 L46 68 Z" fill="#78d6ff" filter="url(#eyeGlow)" opacity="0.95"/>
  <path d="M88 62 L74 56 L68 62 L74 68 Z" fill="#78d6ff" filter="url(#eyeGlow)" opacity="0.95"/>
  <!-- Eye inner bright -->
  <path d="M36 62 L46 58 L50 62 L46 66 Z" fill="#ffffff" opacity="0.5"/>
  <path d="M84 62 L74 58 L70 62 L74 66 Z" fill="#ffffff" opacity="0.5"/>
  <!-- Mouth slit -->
  <rect x="42" y="90" width="36" height="2" rx="1" fill="#3a0808" opacity="0.6"/>
  <!-- Mouth vents -->
  <rect x="44" y="95" width="32" height="1.5" rx="0.75" fill="#3a0808" opacity="0.4"/>
  <rect x="46" y="99" width="28" height="1.5" rx="0.75" fill="#3a0808" opacity="0.3"/>
  <rect x="48" y="103" width="24" height="1.5" rx="0.75" fill="#3a0808" opacity="0.25"/>
  <!-- Chin -->
  <path d="M42 112 L60 118 L78 112" fill="none" stroke="#8a6b0a" stroke-width="0.5" opacity="0.5"/>
  <!-- Side panels -->
  <path d="M12 70 C12 50 18 35 25 25 L20 48 L15 70" fill="#5a0f0f" opacity="0.5"/>
  <path d="M108 70 C108 50 102 35 95 25 L100 48 L105 70" fill="#5a0f0f" opacity="0.5"/>
  <!-- Highlight -->
  <ellipse cx="45" cy="20" rx="15" ry="6" fill="white" opacity="0.06"/>
</svg>
