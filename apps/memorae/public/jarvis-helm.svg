<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="15%" stop-color="#e0f4ff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#78d6ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#40b0ff" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#1090e0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0060a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60c0ff" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#3090d0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="15"/></filter>
  </defs>
  <!-- Outer ambient glow -->
  <circle cx="100" cy="100" r="95" fill="url(#outerGlow)" filter="url(#blur3)"/>
  <!-- Outer ring glow -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#50a8d8" stroke-width="1.5" opacity="0.2" filter="url(#blur2)"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#78c8e8" stroke-width="2" opacity="0.35"/>
  <!-- Tick marks on outer ring -->
  <g opacity="0.3" stroke="#90d0f0" stroke-width="1.5">
    <line x1="100" y1="33" x2="100" y2="40"/>
    <line x1="100" y1="160" x2="100" y2="167"/>
    <line x1="33" y1="100" x2="40" y2="100"/>
    <line x1="160" y1="100" x2="167" y2="100"/>
    <line x1="54" y1="54" x2="59" y2="59"/>
    <line x1="141" y1="54" x2="146" y2="59"/>
    <line x1="54" y1="146" x2="59" y2="141"/>
    <line x1="141" y1="146" x2="146" y2="141"/>
  </g>
  <!-- Mid ring -->
  <circle cx="100" cy="100" r="52" fill="none" stroke="#68bce0" stroke-width="1" opacity="0.25"/>
  <!-- Inner ring glow -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="#80d0f0" stroke-width="2" opacity="0.4" filter="url(#blur1)"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="38" fill="none" stroke="#90d8f8" stroke-width="1.5" opacity="0.5"/>
  <!-- Core spread glow -->
  <circle cx="100" cy="100" r="35" fill="url(#coreGlow)" filter="url(#blur1)" opacity="0.7"/>
  <!-- Core bright center -->
  <circle cx="100" cy="100" r="24" fill="url(#coreGlow)"/>
  <!-- Core white-hot center -->
  <circle cx="100" cy="100" r="12" fill="white" opacity="0.6" filter="url(#blur1)"/>
  <circle cx="100" cy="100" r="6" fill="white" opacity="0.8"/>
  <!-- Triangular segments (like the real arc reactor) -->
  <g opacity="0.15" fill="none" stroke="#a0e0ff" stroke-width="1">
    <path d="M100 62 L115 85 L85 85 Z"/>
    <path d="M100 138 L115 115 L85 115 Z"/>
    <path d="M62 100 L85 85 L85 115 Z"/>
    <path d="M138 100 L115 85 L115 115 Z"/>
  </g>
  <!-- Connector lines from core to ring -->
  <g opacity="0.2" stroke="#80d0f0" stroke-width="0.8">
    <line x1="100" y1="76" x2="100" y2="62"/>
    <line x1="100" y1="124" x2="100" y2="138"/>
    <line x1="76" y1="100" x2="62" y2="100"/>
    <line x1="124" y1="100" x2="138" y2="100"/>
  </g>
  <!-- Subtle highlight -->
  <ellipse cx="92" cy="88" rx="10" ry="8" fill="white" opacity="0.08" transform="rotate(-20 92 88)"/>
</svg>
